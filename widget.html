<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Chat</title>
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5;
      height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      direction: rtl; overflow: hidden;
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
      color: white; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      min-height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 2;
    }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: #25d366;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar-letter { font-size: 18px; font-weight: 700; color: white; }
    .contact-info { flex: 1; }
    .contact-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .contact-phone { font-size: 12px; opacity: 0.8; direction: ltr; text-align: right; }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .status-badge {
      font-size: 10px; padding: 3px 10px; border-radius: 12px; font-weight: 500;
    }
    .status-badge.connected { background: rgba(37,211,102,0.3); border: 1px solid rgba(37,211,102,0.6); }
    .status-badge.disconnected { background: rgba(231,76,60,0.3); border: 1px solid rgba(231,76,60,0.6); }
    .btn-close {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.15); color: white; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; margin-right: 4px;
    }
    .btn-close:hover { background: rgba(255,255,255,0.3); }

    /* ── Messages ── */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      background: #e5ddd5;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4cdc4' fill-opacity='0.25'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .message {
      max-width: 80%; margin-bottom: 6px;
      padding: 7px 10px 4px; border-radius: 8px;
      font-size: 13.5px; line-height: 1.45;
      word-wrap: break-word;
      box-shadow: 0 1px 1px rgba(0,0,0,0.08);
    }
    .message.incoming { background: white; margin-left: auto; border-top-right-radius: 0; }
    .message.outgoing { background: #dcf8c6; margin-right: auto; border-top-left-radius: 0; }
    .message .msg-text { margin-bottom: 2px; }
    .message .time {
      font-size: 10.5px; color: #999; text-align: left;
      display: flex; align-items: center; justify-content: flex-start; gap: 3px;
    }
    .message .status-icon { color: #53bdeb; font-size: 12px; }
    .date-divider { text-align: center; margin: 10px 0; }
    .date-divider span {
      background: #e1f2fb; padding: 4px 12px; border-radius: 8px;
      font-size: 11.5px; color: #555;
    }

    /* ── Quick Replies ── */
    .quick-replies {
      background: #f7f8fa; padding: 6px 12px;
      display: flex; gap: 6px; overflow-x: auto;
      border-top: 1px solid #e0e0e0;
    }
    .quick-replies::-webkit-scrollbar { height: 0; }
    .qr-btn {
      white-space: nowrap; padding: 5px 12px; border-radius: 16px;
      border: 1px solid #d0d0d0; background: white;
      font-size: 12px; cursor: pointer; color: #333;
      transition: all 0.15s; flex-shrink: 0;
    }
    .qr-btn:hover { background: #075e54; color: white; border-color: #075e54; }

    /* ── Input ── */
    .chat-input {
      background: #f0f2f5; padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
      border-top: 1px solid #ddd;
    }
    .chat-input input {
      flex: 1; padding: 10px 14px; border: none; border-radius: 20px;
      font-size: 13.5px; outline: none; direction: rtl; background: white;
    }
    .chat-input input:focus { box-shadow: 0 0 0 2px rgba(7,94,84,0.2); }
    .btn-send {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: #075e54; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .btn-send:hover { background: #128c7e; transform: scale(1.05); }
    .btn-send:disabled { background: #bbb; cursor: not-allowed; transform: none; }

    /* ── States ── */
    .state-box {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: #888;
      gap: 10px; padding: 20px; text-align: center;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #ddd;
      border-top-color: #075e54; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-icon { font-size: 44px; }
    .state-title { font-size: 15px; font-weight: 600; color: #666; }
    .state-sub { font-size: 12px; color: #999; }
    .error-state { color: #e74c3c; }
    .btn-retry {
      padding: 8px 20px; background: #075e54; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 13px;
    }
    .msg-count {
      font-size: 11px; color: #999; text-align: center;
      padding: 8px; background: rgba(255,255,255,0.5);
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="chat-header">
    <div class="avatar"><span class="avatar-letter" id="avatarLetter">?</span></div>
    <div class="contact-info">
      <div class="contact-name" id="contactName">טוען...</div>
      <div class="contact-phone" id="contactPhone"></div>
    </div>
    <div class="header-actions">
      <span class="status-badge disconnected" id="statusBadge">מנותק</span>
      <button class="btn-close" onclick="closeWidget()" title="סגור">✕</button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="state-box" id="loadingState">
      <div class="spinner"></div>
      <div class="state-title">טוען היסטוריית הודעות...</div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies" style="display:none">
    <button class="qr-btn" onclick="quickSend('היי, קיבלתי את הפנייה שלך ואטפל בה בהקדם')">קיבלתי את הפנייה</button>
    <button class="qr-btn" onclick="quickSend('תודה רבה! יום נעים')">תודה, יום נעים</button>
    <button class="qr-btn" onclick="quickSend('האם תוכל לשלוח לי פרטים נוספים?')">שלח פרטים נוספים</button>
    <button class="qr-btn" onclick="quickSend('אשמח לתאם שיחה, מתי נוח לך?')">תיאום שיחה</button>
  </div>

  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="כתוב הודעה..." disabled autocomplete="off">
    <button class="btn-send" id="sendBtn" disabled onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

<script>
// =============================================================
// CONFIGURATION
// =============================================================
const CONFIG = {
  N8N_BASE_URL: 'https://n8n.srv1254786.hstgr.cloud',
  N8N_SEND_PATH: '/webhook/whatsapp-send',
  N8N_HISTORY_PATH: '/webhook/whatsapp-history',
  PHONE_FIELD: 'Mobile',
  POLL_INTERVAL: 10000,
  ZOHO_MODULE: 'WhatsApp_Messages',  // Custom module API name
};

// =============================================================
// STATE
// =============================================================
let currentRecordId = null;
let currentModule = null;
let currentPhone = null;
let contactName = '';
let pollingTimer = null;
let lastMessageTimestamp = null;

// =============================================================
// INIT — Zoho SDK
// =============================================================
ZOHO.embeddedApp.on("PageLoad", function(data) {
  currentRecordId = data.EntityId;
  currentModule = data.Entity;
  loadContactData();
});

ZOHO.embeddedApp.init();

// =============================================================
// LOAD CONTACT DATA FROM CURRENT RECORD
// =============================================================
async function loadContactData() {
  try {
    const response = await ZOHO.CRM.API.getRecord({
      Entity: currentModule,
      RecordID: currentRecordId
    });
    const record = response.data[0];

    // Find phone number
    currentPhone = record[CONFIG.PHONE_FIELD] || record.Mobile || record.Phone || null;

    // Get contact name + phone based on module type
    if (currentModule === 'Deals') {
      contactName = record.Deal_Name || record.Account_Name?.name || 'עסקה';
      if (!currentPhone && record.Contact_Name) {
        const c = await ZOHO.CRM.API.getRecord({ Entity: 'Contacts', RecordID: record.Contact_Name.id });
        if (c.data?.[0]) {
          currentPhone = c.data[0].Mobile || c.data[0].Phone;
          contactName = `${c.data[0].First_Name || ''} ${c.data[0].Last_Name || ''}`.trim() || contactName;
        }
      }
    } else if (currentModule === 'Cases') {
      contactName = record.Subject || 'קריאת שירות';
      if (record.Contact_Name) {
        const c = await ZOHO.CRM.API.getRecord({ Entity: 'Contacts', RecordID: record.Contact_Name.id });
        if (c.data?.[0]) {
          currentPhone = c.data[0].Mobile || c.data[0].Phone;
          contactName = `${c.data[0].First_Name || ''} ${c.data[0].Last_Name || ''}`.trim() || contactName;
        }
      }
    } else {
      contactName = `${record.First_Name || ''} ${record.Last_Name || ''}`.trim() || record.Full_Name || 'איש קשר';
    }

    // Update header UI
    document.getElementById('contactName').textContent = contactName;
    document.getElementById('contactPhone').textContent = formatPhoneDisplay(currentPhone);
    document.getElementById('avatarLetter').textContent = contactName ? contactName.charAt(0) : '?';

    if (currentPhone) {
      document.getElementById('statusBadge').textContent = 'מחובר';
      document.getElementById('statusBadge').className = 'status-badge connected';
      document.getElementById('messageInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('quickReplies').style.display = 'flex';
      await loadChatHistory();
      startPolling();
    } else {
      showError('לא נמצא מספר טלפון לרשומה זו');
    }
  } catch (err) {
    console.error('loadContactData error:', err);
    showError('שגיאה בטעינת נתוני הלקוח');
  }
}

// =============================================================
// LOAD CHAT HISTORY — from WhatsApp_Messages module via n8n
// =============================================================
async function loadChatHistory() {
  const el = document.getElementById('chatMessages');
  try {
    const res = await fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_HISTORY_PATH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        phone: normalizePhone(currentPhone),
        recordId: currentRecordId,
        module: currentModule
      })
    });
    const data = await res.json();

    if (data.messages?.length > 0) {
      el.innerHTML = `<div class="msg-count">${data.messages.length} הודעות</div>`;
      let lastDate = '';
      data.messages.forEach(msg => {
        const d = new Date(msg.timestamp).toLocaleDateString('he-IL');
        if (d !== lastDate) {
          lastDate = d;
          const div = document.createElement('div');
          div.className = 'date-divider';
          div.innerHTML = `<span>${d}</span>`;
          el.appendChild(div);
        }
        appendMessage(msg);
      });
      lastMessageTimestamp = data.messages[data.messages.length - 1].timestamp;
      scrollToBottom();
    } else {
      el.innerHTML = `
        <div class="state-box">
          <div class="state-icon">💬</div>
          <div class="state-title">אין הודעות עדיין</div>
          <div class="state-sub">שלח הודעה ראשונה או השתמש בתשובות מהירות</div>
        </div>`;
    }
  } catch (err) {
    console.error('loadChatHistory error:', err);
    el.innerHTML = `
      <div class="state-box error-state">
        <div class="state-icon">⚠️</div>
        <div class="state-title">שגיאה בטעינת ההיסטוריה</div>
        <button class="btn-retry" onclick="loadChatHistory()">נסה שוב</button>
      </div>`;
  }
}

// =============================================================
// SEND MESSAGE — via n8n → Green API → save to WhatsApp_Messages
// =============================================================
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text || !currentPhone) return;

  document.getElementById('sendBtn').disabled = true;
  input.value = '';

  // Remove empty state
  const empty = document.querySelector('.state-box');
  if (empty && document.getElementById('chatMessages').contains(empty)) empty.remove();

  // Optimistic UI
  appendMessage({ direction: 'outgoing', text, timestamp: new Date().toISOString(), status: 'sending' });
  scrollToBottom();

  try {
    const res = await fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_SEND_PATH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        phone: normalizePhone(currentPhone),
        message: text,
        recordId: currentRecordId,
        module: currentModule,
        contactName
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'failed');

    // Update last message tick
    const msgs = document.querySelectorAll('.message.outgoing');
    const last = msgs[msgs.length - 1];
    if (last) {
      const t = last.querySelector('.time');
      const tm = t.textContent.replace('🕐 ', '');
      t.innerHTML = `<span class="status-icon">✓✓</span> ${tm}`;
    }
  } catch (err) {
    console.error('sendMessage error:', err);
    const msgs = document.querySelectorAll('.message.outgoing');
    const last = msgs[msgs.length - 1];
    if (last) {
      const t = last.querySelector('.time');
      t.innerHTML = '❌ שליחה נכשלה — לחץ לנסות שוב';
      t.style.color = '#e74c3c';
      t.style.cursor = 'pointer';
      t.onclick = () => { input.value = text; last.remove(); sendMessage(); };
    }
  }
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function quickSend(text) {
  document.getElementById('messageInput').value = text;
  sendMessage();
}

// =============================================================
// POLLING — check for new incoming messages
// =============================================================
function startPolling() {
  if (pollingTimer) clearInterval(pollingTimer);
  pollingTimer = setInterval(async () => {
    try {
      const res = await fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_HISTORY_PATH, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone: normalizePhone(currentPhone),
          recordId: currentRecordId,
          module: currentModule,
          since: lastMessageTimestamp
        })
      });
      const data = await res.json();
      if (data.messages?.length > 0) {
        const empty = document.querySelector('.state-box');
        if (empty) empty.remove();
        data.messages.forEach(msg => appendMessage(msg));
        lastMessageTimestamp = data.messages[data.messages.length - 1].timestamp;
        scrollToBottom();
      }
    } catch (err) { console.error('Polling error:', err); }
  }, CONFIG.POLL_INTERVAL);
}

// =============================================================
// CLOSE POPUP
// =============================================================
function closeWidget() {
  if (pollingTimer) clearInterval(pollingTimer);
  try { ZOHO.CRM.UI.Popup.close(); } catch(e) {
    try { ZOHO.CRM.UI.Popup.closeReload(); } catch(e2) {}
  }
}

// =============================================================
// UI HELPERS
// =============================================================
function appendMessage(msg) {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${msg.direction || 'outgoing'}`;
const msgDate = new Date(msg.timestamp);
const time = msgDate.toLocaleDateString('he-IL', { day: 'numeric', month: 'short' }) + ' · ' + msgDate.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });  const icon = msg.direction === 'outgoing'
    ? (msg.status === 'sending' ? '🕐 ' : '<span class="status-icon">✓✓</span> ')
    : '';
  div.innerHTML = `<div class="msg-text">${escapeHtml(msg.text)}</div><div class="time">${icon}${time}</div>`;
  el.appendChild(div);
}

function scrollToBottom() {
  const el = document.getElementById('chatMessages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function showError(text) {
  document.getElementById('chatMessages').innerHTML = `
    <div class="state-box error-state">
      <div class="state-icon">⚠️</div>
      <div class="state-title">${text}</div>
    </div>`;
}

function normalizePhone(phone) {
  if (!phone) return '';
  let c = phone.replace(/\D/g, '');
  if (c.startsWith('0')) c = '972' + c.substring(1);
  if (!c.startsWith('972') && c.length === 9) c = '972' + c;
  return c;
}

function formatPhoneDisplay(phone) {
  if (!phone) return '';
  const c = phone.replace(/\D/g, '');
  if (c.startsWith('972')) {
    const local = '0' + c.substring(3);
    return local.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3') + '  |  +' + c;
  }
  return phone;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

document.getElementById('messageInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});
window.addEventListener('beforeunload', () => { if (pollingTimer) clearInterval(pollingTimer); });
</script>
</body>
</html>
