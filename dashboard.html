<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Incoming</title>
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #fff;
      direction: rtl;
      padding: 10px 12px;
      color: #333;
      max-width: 500px;
    }

    .dash-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #25d366;
    }
    .dash-header .icon {
      width: 26px; height: 26px;
      background: #25d366; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: white; flex-shrink: 0;
    }
    .dash-title { font-size: 13px; font-weight: 700; color: #075e54; }
    .dash-count {
      background: #e74c3c; color: white;
      font-size: 11px; font-weight: 600;
      padding: 1px 8px; border-radius: 10px;
    }
    .dash-date { font-size: 11px; color: #999; margin-right: auto; }
    .btn-refresh {
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: #075e54; padding: 2px;
    }

    .msg-list {
      display: flex; flex-direction: column;
      gap: 4px; max-height: 350px; overflow-y: auto;
    }
    .msg-item {
      display: flex; align-items: center;
      gap: 8px; padding: 6px 8px;
      border-radius: 6px; background: #f8f9fa;
      border-right: 2px solid #25d366;
      transition: all 0.2s;
    }
    .msg-item:hover { background: #eef6ee; }
    .msg-item.read {
      opacity: 0.4;
      border-right-color: #ccc;
      transition: opacity 0.5s;
    }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #666;
      flex-shrink: 0;
    }
    .msg-avatar.has-contact { background: #25d366; color: white; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-top {
      display: flex; align-items: center; gap: 6px;
    }
    .msg-sender {
      font-size: 12px; font-weight: 600; color: #333;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .msg-sender a { color: #075e54; text-decoration: none; }
    .msg-sender a:hover { text-decoration: underline; }
    .msg-time {
      font-size: 10px; color: #999;
      margin-right: auto; white-space: nowrap;
    }
    .msg-text {
      font-size: 11.5px; color: #555; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Mark as read button */
    .btn-read {
      background: none; border: 1px solid #ccc;
      border-radius: 50%; width: 22px; height: 22px;
      cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      color: #999; flex-shrink: 0;
      transition: all 0.15s;
    }
    .btn-read:hover { background: #25d366; color: white; border-color: #25d366; }
    .btn-read.done { background: #25d366; color: white; border-color: #25d366; pointer-events: none; }

    .state-box {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 16px; color: #999; gap: 6px;
    }
    .state-icon { font-size: 32px; }
    .state-title { font-size: 13px; font-weight: 600; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #ddd; border-top-color: #25d366;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg-list::-webkit-scrollbar { width: 3px; }
    .msg-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="dash-header">
    <div class="icon">💬</div>
    <div class="dash-title">הודעות נכנסות</div>
    <div class="dash-count" id="dashCount" style="display:none">0</div>
    <div class="dash-date" id="dashDate"></div>
    <button class="btn-refresh" onclick="loadMessages()" title="רענן">🔄</button>
  </div>

  <div id="msgList" class="msg-list">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">טוען...</div>
    </div>
  </div>

<script>
const CONFIG = {
  N8N_BASE_URL: 'https://n8n.srv1254786.hstgr.cloud',
  N8N_DASHBOARD_PATH: '/webhook/whatsapp-dashboard',
  N8N_MARK_READ_PATH: '/webhook/whatsapp-mark-read',
  REFRESH_INTERVAL: 30000,
};

let refreshTimer = null;
let unreadCount = 0;

ZOHO.embeddedApp.on("PageLoad", function(data) {
  loadMessages();
  startAutoRefresh();
});
ZOHO.embeddedApp.init();

document.getElementById('dashDate').textContent = new Date().toLocaleDateString('he-IL', {
  day: 'numeric', month: 'short'
});

async function loadMessages() {
  const listEl = document.getElementById('msgList');
  try {
    const res = await fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_DASHBOARD_PATH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'dashboard' })
    });
    const data = await res.json();

    if (data.messages && data.messages.length > 0) {
      unreadCount = data.messages.length;
      updateCount();
      listEl.innerHTML = '';
      data.messages.forEach(msg => listEl.appendChild(createMessageItem(msg)));
    } else {
      unreadCount = 0;
      updateCount();
      listEl.innerHTML = '<div class="state-box"><div class="state-icon">✅</div><div class="state-title">אין הודעות שלא נקראו</div></div>';
    }
  } catch (err) {
    console.error('Dashboard error:', err);
    listEl.innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">שגיאה בטעינה</div></div>';
  }
}

function updateCount() {
  const el = document.getElementById('dashCount');
  if (unreadCount > 0) {
    el.textContent = unreadCount;
    el.style.display = 'inline';
  } else {
    el.style.display = 'none';
  }
}

function createMessageItem(msg) {
  const div = document.createElement('div');
  div.className = 'msg-item';
  div.id = `msg-${msg.recordId}`;
  const initial = msg.senderName ? msg.senderName.charAt(0) : '?';
  const hasContact = msg.contactId ? 'has-contact' : '';
const msgDate = new Date(msg.timestamp);
const time = msgDate.toLocaleDateString('he-IL', { day: 'numeric', month: 'short' }) + ' · ' + msgDate.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  let senderHtml = '';
  if (msg.contactId && msg.contactModule) {
    senderHtml = `<a href="javascript:void(0)" onclick="openRecord('${msg.contactModule}','${msg.contactId}')">${escapeHtml(msg.senderName || msg.phone)}</a>`;
  } else {
    senderHtml = escapeHtml(msg.senderName || msg.phone);
  }

  div.innerHTML = `
    <div class="msg-avatar ${hasContact}">${initial}</div>
    <div class="msg-body">
      <div class="msg-top">
        <div class="msg-sender">${senderHtml}</div>
        <div class="msg-time">${time}</div>
      </div>
      <div class="msg-text">${escapeHtml(msg.text)}</div>
    </div>
    <button class="btn-read" onclick="markAsRead('${msg.recordId}', this)" title="סמן כנקראה">✓</button>
  `;
  return div;
}

async function markAsRead(recordId, btnEl) {
  // Immediate UI feedback
  btnEl.className = 'btn-read done';
  btnEl.textContent = '✓';
  const msgItem = document.getElementById(`msg-${recordId}`);
  if (msgItem) msgItem.classList.add('read');

  // Update count
  unreadCount = Math.max(0, unreadCount - 1);
  updateCount();

  // Remove from list after animation
  setTimeout(() => {
    if (msgItem) msgItem.remove();
    // Check if list is empty
    const listEl = document.getElementById('msgList');
    if (listEl.children.length === 0) {
      listEl.innerHTML = '<div class="state-box"><div class="state-icon">✅</div><div class="state-title">אין הודעות שלא נקראו</div></div>';
    }
  }, 600);

  // Send to n8n to update Zoho
  try {
    await fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_MARK_READ_PATH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId })
    });
  } catch (err) {
    console.error('Mark read error:', err);
  }
}

function openRecord(module, id) {
  try { ZOHO.CRM.UI.Record.open({ Entity: module, RecordID: id }); }
  catch(e) { window.open(`https://crm.zoho.com/crm/tab/${module}/${id}`, '_blank'); }
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadMessages, CONFIG.REFRESH_INTERVAL);
}

function escapeHtml(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
</script>
</body>
</html>
