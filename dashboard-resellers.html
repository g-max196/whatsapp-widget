<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp הודעות משווקים</title>
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #fff; direction: rtl; padding: 10px 12px; color: #333; max-width: 500px;
    }
    .dash-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #FF9800;
    }
    .dash-header .icon {
      width: 26px; height: 26px; background: #FF9800; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: white; flex-shrink: 0;
    }
    .dash-title { font-size: 13px; font-weight: 700; color: #075e54; }
    .dash-count {
      background: #e74c3c; color: white; font-size: 11px;
      font-weight: 600; padding: 1px 8px; border-radius: 10px;
    }
    .dash-date { font-size: 11px; color: #999; margin-right: auto; }
    .btn-refresh { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px; }
    .msg-list { display: flex; flex-direction: column; gap: 4px; max-height: 380px; overflow-y: auto; }
    .msg-item {
      display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px;
      border-radius: 6px; background: #f8f9fa; border: 1px solid #eee;
      transition: all 0.3s;
    }
    .msg-item:hover { background: #f0f0f0; }
    .msg-item.read { opacity: 0.4; transform: translateX(-20px); }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #bbb;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: white; flex-shrink: 0;
    }
    .msg-avatar.has-contact { background: #FF9800; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-top { display: flex; align-items: center; gap: 6px; }
    .msg-sender {
      font-size: 12px; font-weight: 600; color: #333;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .msg-sender a { color: #FF9800; text-decoration: none; font-weight: 700; }
    .msg-sender a:hover { text-decoration: underline; }
    .msg-time { font-size: 10px; color: #aaa; flex-shrink: 0; }
    .msg-text {
      font-size: 11.5px; color: #666; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 280px; margin-top: 1px;
    }
    .btn-read {
      width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #ccc;
      background: white; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      color: #999; flex-shrink: 0; transition: all 0.15s;
    }
    .btn-read:hover { background: #FF9800; color: white; border-color: #FF9800; }
    .btn-read.done { background: #FF9800; color: white; border-color: #FF9800; pointer-events: none; }
    .state-box {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 30px 16px; color: #999; gap: 6px;
    }
    .state-icon { font-size: 32px; }
    .state-title { font-size: 13px; font-weight: 600; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid #ddd;
      border-top-color: #FF9800; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg-list::-webkit-scrollbar { width: 3px; }
    .msg-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="dash-header">
    <div class="icon">🏢</div>
    <div class="dash-title">הודעות משווקים</div>
    <div class="dash-count" id="dashCount" style="display:none">0</div>
    <div class="dash-date" id="dashDate"></div>
    <button class="btn-refresh" onclick="loadMessages()" title="רענן">🔄</button>
  </div>
  <div id="msgList" class="msg-list">
    <div class="state-box"><div class="spinner"></div><div class="state-title">טוען...</div></div>
  </div>
<script>
var CONFIG = {
  N8N_BASE_URL: 'https://n8n.srv1254786.hstgr.cloud',
  N8N_DASHBOARD_PATH: '/webhook/whatsapp-dashboard',
  N8N_MARK_READ_PATH: '/webhook/whatsapp-mark-read',
  CATEGORY: 'reseller',
  REFRESH_INTERVAL: 30000
};

var refreshTimer = null;
var unreadCount = 0;

function init() {
  try { ZOHO.embeddedApp.init(); } catch(e) {}
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('he-IL');
  loadMessages();
  refreshTimer = setInterval(loadMessages, CONFIG.REFRESH_INTERVAL);
}

function loadMessages() {
  var list = document.getElementById('msgList');
  fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_DASHBOARD_PATH + '?category=' + CONFIG.CATEGORY)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      unreadCount = data.count || 0;
      updateCount();
      if (data.messages && data.messages.length > 0) {
        list.innerHTML = '';
        data.messages.forEach(function(msg) {
          list.appendChild(createMsgEl(msg));
        });
      } else {
        list.innerHTML = '<div class="state-box"><div class="state-icon">✅</div><div class="state-title">אין הודעות חדשות</div></div>';
      }
    })
    .catch(function(err) {
      console.error('Dashboard error:', err);
      list.innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">שגיאה בטעינה</div></div>';
    });
}

function updateCount() {
  var el = document.getElementById('dashCount');
  el.textContent = unreadCount;
  el.style.display = unreadCount > 0 ? 'inline-block' : 'none';
}

function createMsgEl(msg) {
  var div = document.createElement('div');
  div.className = 'msg-item';
  div.id = 'msg-' + msg.id;

  var initial = (msg.sender && msg.sender.length > 0) ? msg.sender.charAt(0) : '?';
  var hasContact = (msg.contactId || msg.leadId) ? 'has-contact' : '';
var time = ''; if (msg.time) { var d = new Date(msg.time); var today = new Date(); var isToday = d.toDateString() === today.toDateString(); var timeStr = d.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}); time = isToday ? timeStr : d.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'}) + ' ' + timeStr; }

  var senderHtml = '';
  if (msg.contactId) {
    senderHtml = '<a href="javascript:void(0)" onclick="openRecord(\'Contacts\',\'' + msg.contactId + '\')">' + escapeHtml(msg.contactName || msg.sender) + '</a>';
  } else if (msg.leadId) {
    senderHtml = '<a href="javascript:void(0)" onclick="openRecord(\'Leads\',\'' + msg.leadId + '\')">' + escapeHtml(msg.leadName || msg.sender) + '</a>';
  } else {
    senderHtml = escapeHtml(msg.sender || msg.phone);
  }

  div.innerHTML =
    '<div class="msg-avatar ' + hasContact + '">' + initial + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-top">' +
        '<div class="msg-sender">' + senderHtml + '</div>' +
        '<div class="msg-time">' + time + '</div>' +
      '</div>' +
      '<div class="msg-text">' + escapeHtml(msg.text || '') + '</div>' +
    '</div>' +
    '<button class="btn-read" onclick="markAsRead(\'' + msg.id + '\', this)" title="סמן כנקראה">✓</button>';

  return div;
}

function markAsRead(recordId, btnEl) {
  btnEl.className = 'btn-read done';
  btnEl.textContent = '✓';
  var msgItem = document.getElementById('msg-' + recordId);
  if (msgItem) msgItem.classList.add('read');

  unreadCount = Math.max(0, unreadCount - 1);
  updateCount();

  setTimeout(function() {
    if (msgItem) msgItem.remove();
    var listEl = document.getElementById('msgList');
    if (listEl.children.length === 0) {
      listEl.innerHTML = '<div class="state-box"><div class="state-icon">✅</div><div class="state-title">אין הודעות שלא נקראו</div></div>';
    }
  }, 600);

  fetch(CONFIG.N8N_BASE_URL + CONFIG.N8N_MARK_READ_PATH, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ recordId: recordId })
  }).catch(function(err) { console.error('Mark read error:', err); });
}

function openRecord(module, id) {
  try { ZOHO.CRM.UI.Record.open({ Entity: module, RecordID: id }); }
  catch(e) { window.open('https://crm.zoho.com/crm/tab/' + module + '/' + id, '_blank'); }
}

function escapeHtml(t) {
  if (!t) return '';
  var d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

init();
</script>
</body>
</html>
